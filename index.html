<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LoveIt Labs</title>
<meta name="description" content="LoveIt Labs — building things we love.">
<style>
  :root {
    --bg: #0f0f12;
    --fg: #f5f5f7;
    --muted: #9a9aa3;
    --accent: #ff5577;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  main {
    min-height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    text-align: center;
  }
  h1 {
    font-size: clamp(2.5rem, 8vw, 5rem);
    font-weight: 700;
    margin: 0 0 0.5rem;
    letter-spacing: -0.02em;
  }
  h1 .heart { color: var(--accent); }
  p {
    font-size: clamp(1rem, 2.5vw, 1.25rem);
    color: var(--muted);
    margin: 0 0 2rem;
    max-width: 32rem;
    line-height: 1.5;
  }
</style>
</head>
<body>
  <main>
    <h1>Love<span class="heart">It</span> Labs</h1>
    <p>We build things we love.</p>
  </main>
</body>
</html>
