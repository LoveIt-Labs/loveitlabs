<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LoveIt Labs</title>
<meta name="description" content="LoveIt Labs — building things we love.">
<style>
  :root {
    --bg: #0f0f12;
    --fg: #f5f5f7;
    --muted: #9a9aa3;
    --accent: #ff5577;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  main {
    min-height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    text-align: center;
  }
  h1 {
    font-size: clamp(2.5rem, 8vw, 5rem);
    font-weight: 700;
    margin: 0 0 0.5rem;
    letter-spacing: -0.02em;
  }
  h1 .heart { color: var(--accent); }
  p {
    font-size: clamp(1rem, 2.5vw, 1.25rem);
    color: var(--muted);
    margin: 0 0 2rem;
    max-width: 32rem;
    line-height: 1.5;
  }
  nav {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    display: flex;
    justify-content: flex-end;
    align-items: center;
    padding: 1rem 1.5rem;
    z-index: 10;
  }
  details.services {
    position: relative;
    font-size: 1rem;
    user-select: none;
  }
  details.services > summary {
    list-style: none;
    cursor: pointer;
    padding: 0.5rem 1.1rem;
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 999px;
    color: var(--fg);
    background: rgba(255, 255, 255, 0.03);
    transition: background 0.15s ease, border-color 0.15s ease;
  }
  details.services > summary::-webkit-details-marker { display: none; }
  details.services > summary:hover {
    background: rgba(255, 255, 255, 0.06);
    border-color: rgba(255, 255, 255, 0.25);
  }
  details.services > summary::after {
    content: " ▾";
    color: var(--muted);
    margin-left: 0.4rem;
  }
  details.services[open] > summary::after { content: " ▴"; }
  details.services ul {
    list-style: none;
    margin: 0.5rem 0 0;
    padding: 0.5rem 0;
    position: absolute;
    top: 100%;
    right: 0;
    min-width: 14rem;
    background: #17171c;
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 0.75rem;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
  }
  details.services li { margin: 0; }
  details.services a {
    display: block;
    padding: 0.6rem 1rem;
    color: var(--fg);
    text-decoration: none;
    font-size: 0.95rem;
  }
  details.services a:hover {
    background: rgba(255, 255, 255, 0.06);
    color: var(--accent);
  }
</style>
</head>
<body>
  <nav>
    <details class="services">
      <summary>Services</summary>
      <ul>
        <li><a href="https://loveitlabs.co.za">Homepage</a></li>
      </ul>
    </details>
  </nav>
  <main>
    <h1>Love<span class="heart">It</span> Labs</h1>
    <p>We build things we love.</p>
  </main>
</body>
</html>
